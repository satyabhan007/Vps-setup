# docker-compose.test.yml
# Minimal Postgres container for integration testing.
# Uses a non-standard port (5433) to avoid collisions with any local Postgres on 5432.

version: "3.8"

services:
  postgres-test:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB:       crm_test_db
      POSTGRES_USER:     test_admin
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_admin -d crm_test_db"]
      interval: 2s
      timeout: 5s
      retries: 15

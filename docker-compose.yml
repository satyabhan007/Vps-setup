version: '3.8'

services:
  # The PaaS Layer
  dokploy:
    image: dokploy/dokploy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy_data:/var/lib/dokploy
    ports:
      - "3000:3000"
    restart: always

  # The Agent API (The Bridge between n8n and Python Experts)
  agent-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - CLINIC_ID=clinic_default
      - ADMIN_GROUP=ADMIN_WHATSAPP_GROUP_ID
    restart: always

  # The Logic Hub
  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_HOST=crm.yourdomain.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://crm.yourdomain.com/
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    restart: always

  # The State & Vector Database
  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secure_password_change_me
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # The Data Lakehouse (Raw Logs)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=secure_password_change_me
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

volumes:
  dokploy_data:
  n8n_data:
  pg_data:
  minio_data:
